name: visual regression test

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/visual-regression-test.yaml
      - libs/**
      - package.json
      - packages/api/**
      - packages/ui/**
      - packages/web/**
      - tools/vrt-selector/**
      - yarn.lock

concurrency:
  group: visual-regression-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  story-selector:
    name: story selector
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.select.outputs.packages || steps.empty.outputs.packages }}
      services-json: ${{ steps.select.outputs.services-json || steps.empty.outputs.services-json }}
      story-files-pr: ${{ steps.select.outputs.story-files-pr || steps.empty.outputs.story-files-pr }}
      story-files-base: ${{ steps.select.outputs.story-files-base || steps.empty.outputs.story-files-base }}
      reason: ${{ steps.select.outputs.reason || steps.empty.outputs.reason }}
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Collect changed files
        id: collect
        run: |
          CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | grep -E '(^package\.json$|^yarn\.lock$|^packages/(ui|web)/regconfig\.json$|\.(ts|tsx|css)$)' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No ts/tsx/css/package.json/yarn.lock/regconfig.json changes."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has-changes=true" >> "$GITHUB_OUTPUT"
          DELIMITER="$(openssl rand -hex 16)"
          echo "changed-files<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Test vrt-selector
        run: node --test tools/vrt-selector/src/story-candidates.test.js

      - name: Select stories with script
        id: select
        if: steps.collect.outputs.has-changes == 'true'
        env:
          CHANGED_FILES: ${{ steps.collect.outputs.changed-files }}
        run: |
          RESULT=$(node tools/vrt-selector/src/story-candidates.js)
          echo "$RESULT"

          PACKAGES=$(echo "$RESULT" | jq -r '.packages // ""')
          STORY_FILES=$(echo "$RESULT" | jq -r '.storyFiles // [] | join(",")')
          REASON=$(echo "$RESULT" | jq -r '.reason // ""')

          NORMALIZED_PACKAGES=$(echo "$PACKAGES" | tr ',' '\n' | grep -E '^(ui|web)$' | sort -u | paste -sd, - || true)
          if [ -z "$NORMALIZED_PACKAGES" ] || [ -z "$STORY_FILES" ]; then
            NORMALIZED_PACKAGES=""
            STORY_FILES=""
          fi

          if [ -z "$NORMALIZED_PACKAGES" ]; then
            SERVICES_JSON='[]'
          else
            SERVICES_JSON=$(echo "$NORMALIZED_PACKAGES" | tr ',' '\n' | jq -R . | jq -cs .)
          fi

          # base ブランチに存在するファイルのみに絞り込む
          STORY_FILES_BASE=$(echo "$STORY_FILES" | tr ',' '\n' | while read -r f; do
            git cat-file -e "${{ github.event.pull_request.base.sha }}:$f" 2>/dev/null && echo "$f"
          done | paste -sd, - || true)

          echo "packages=$NORMALIZED_PACKAGES" >> "$GITHUB_OUTPUT"
          echo "services-json=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "story-files-pr=$STORY_FILES" >> "$GITHUB_OUTPUT"
          echo "story-files-base=$STORY_FILES_BASE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Set empty outputs
        id: empty
        if: steps.collect.outputs.has-changes != 'true'
        run: |
          echo "packages=" >> "$GITHUB_OUTPUT"
          echo "services-json=[]" >> "$GITHUB_OUTPUT"
          echo "story-files-pr=" >> "$GITHUB_OUTPUT"
          echo "story-files-base=" >> "$GITHUB_OUTPUT"
          echo "reason=no-changes" >> "$GITHUB_OUTPUT"

  storybook-build-pr:
    name: storybook build (PR branch)
    needs: story-selector
    runs-on: ubuntu-latest
    if: needs.story-selector.outputs.packages != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.story-selector.outputs.services-json) }}
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Japanese Font Install
        run: sudo apt install fonts-noto-cjk

      - name: Set up playwright
        run: yarn playwright install

      - name: Select story files for service
        id: files
        env:
          SERVICE: ${{ matrix.service }}
          STORY_FILES: ${{ needs.story-selector.outputs.story-files-pr }}
        run: |
          SERVICE_FILES=$(echo "$STORY_FILES" | tr ',' '\n' | grep -E "^packages/${SERVICE}/.+\.stories\.tsx$" | paste -sd, - || true)
          if [ -z "$SERVICE_FILES" ]; then
            echo "No stories selected for $SERVICE." >&2
            exit 1
          fi
          echo "story-files=$SERVICE_FILES" >> "$GITHUB_OUTPUT"

      - name: Build storybook (PR branch)
        env:
          SERVICE: ${{ matrix.service }}
          STORYBOOK_ONLY_STORY_FILES: ${{ steps.files.outputs.story-files }}
        run: |
          if [ "$SERVICE" = "ui" ]; then
            yarn ui vrtest-setup
          else
            yarn web vrtest-setup
          fi

      - name: Upload storybook artifact (PR)
        uses: actions/upload-artifact@v4
        with:
          name: storybook-${{ matrix.service }}-pr
          path: packages/${{ matrix.service }}/build/
          retention-days: 1

  storybook-build-base:
    name: storybook build (base branch)
    needs: story-selector
    runs-on: ubuntu-latest
    if: needs.story-selector.outputs.packages != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.story-selector.outputs.services-json) }}
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Japanese Font Install
        run: sudo apt install fonts-noto-cjk

      - name: Set up playwright
        run: yarn playwright install

      - name: Select story files for service
        id: files
        env:
          SERVICE: ${{ matrix.service }}
          STORY_FILES: ${{ needs.story-selector.outputs.story-files-base }}
        run: |
          SERVICE_FILES=$(echo "$STORY_FILES" | tr ',' '\n' | grep -E "^packages/${SERVICE}/.+\.stories\.tsx$" | paste -sd, - || true)
          if [ -z "$SERVICE_FILES" ]; then
            echo "No stories exist for $SERVICE in base branch, skipping." >&2
            echo "story-files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "story-files=$SERVICE_FILES" >> "$GITHUB_OUTPUT"

      - name: Build storybook (base branch)
        if: steps.files.outputs.story-files != ''
        env:
          SERVICE: ${{ matrix.service }}
          STORYBOOK_ONLY_STORY_FILES: ${{ steps.files.outputs.story-files }}
        run: |
          if [ "$SERVICE" = "ui" ]; then
            yarn ui vrtest-setup
          else
            yarn web vrtest-setup
          fi

      - name: Upload storybook artifact (base)
        if: steps.files.outputs.story-files != ''
        uses: actions/upload-artifact@v4
        with:
          name: storybook-${{ matrix.service }}-base
          path: packages/${{ matrix.service }}/build/
          retention-days: 1

  screenshot-pr:
    name: storybook screenshot (PR branch)
    needs: [story-selector, storybook-build-pr]
    runs-on: ubuntu-latest
    if: needs.story-selector.outputs.packages != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.story-selector.outputs.services-json) }}
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Japanese Font Install
        run: sudo apt install fonts-noto-cjk

      - name: Set up playwright
        run: yarn playwright install

      - name: Download storybook artifact (PR)
        uses: actions/download-artifact@v4
        with:
          name: storybook-${{ matrix.service }}-pr
          path: packages/${{ matrix.service }}/build/

      - name: Capture snapshots (PR branch)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          if [ "$SERVICE" = "ui" ]; then
            yarn ui vrtest-snapshot
          else
            yarn web vrtest-snapshot
          fi

      - name: Prepare screenshots artifact (PR)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          mkdir -p "artifacts/${SERVICE}"
          cp -R "packages/${SERVICE}/snapshot/__snapshots__" "artifacts/${SERVICE}/"

      - name: Upload screenshots artifact (PR)
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.service }}-pr
          path: artifacts/
          retention-days: 1

  screenshot-base:
    name: storybook screenshot (base branch)
    needs: [story-selector, storybook-build-base]
    runs-on: ubuntu-latest
    if: needs.story-selector.outputs.packages != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.story-selector.outputs.services-json) }}
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Japanese Font Install
        run: sudo apt install fonts-noto-cjk

      - name: Set up playwright
        run: yarn playwright install

      - name: Download storybook artifact (base)
        uses: actions/download-artifact@v4
        with:
          name: storybook-${{ matrix.service }}-base
          path: packages/${{ matrix.service }}/build/

      - name: Capture snapshots (base branch)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          if [ "$SERVICE" = "ui" ]; then
            yarn ui vrtest-snapshot
          else
            yarn web vrtest-snapshot
          fi

      - name: Prepare screenshots artifact (base)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          mkdir -p "artifacts/${SERVICE}"
          cp -R "packages/${SERVICE}/snapshot/__snapshots__" "artifacts/${SERVICE}/"

      - name: Upload screenshots artifact (base)
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.service }}-base
          path: artifacts/
          retention-days: 1

  visual-regression-test:
    name: visual regression test
    needs: [story-selector, screenshot-pr, screenshot-base]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      always()
      && needs.story-selector.outputs.packages != ''
      && needs.screenshot-pr.result == 'success'
      && needs.screenshot-base.result == 'success'
    steps:
      - name: set up repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up node_modules
        uses: ./.github/actions/setup-node

      - name: Download PR screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*-pr
          merge-multiple: true
          path: artifacts-pr/

      - name: Download base screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*-base
          merge-multiple: true
          path: artifacts-base/

      - name: Set up reg-suit expected and actual directories
        run: |
          mkdir -p __screenshots__ __expected__
          if [ -d artifacts-pr/ui/__snapshots__ ]; then
            cp -R artifacts-pr/ui/__snapshots__ __screenshots__/ui
          fi
          if [ -d artifacts-pr/web/__snapshots__ ]; then
            cp -R artifacts-pr/web/__snapshots__ __screenshots__/web
          fi
          if [ -d artifacts-base/ui/__snapshots__ ]; then
            cp -R artifacts-base/ui/__snapshots__ __expected__/ui
          fi
          if [ -d artifacts-base/web/__snapshots__ ]; then
            cp -R artifacts-base/web/__snapshots__ __expected__/web
          fi

      - name: run reg-suit
        run: yarn vrtest-regression
        env:
          REG_NOTICE_CLIENT_ID: ${{ secrets.REG_NOTICE_CLIENT_ID }}
          REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.reg
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
